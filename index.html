<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singkawang Style Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Inter", sans-serif;
      background: #000;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 720px;
      overflow: hidden;
      color: white;
      background:
        linear-gradient(rgba(15, 32, 50, 0.42), rgba(15, 32, 50, 0.5)),
        url("https://images.unsplash.com/photo-1517479149777-5f3b1511d5ad?auto=format&fit=crop&w=1800&q=80")
        center center / cover no-repeat;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(20, 40, 60, 0.22), rgba(0, 0, 0, 0.18)),
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 45%);
      pointer-events: none;
    }

    .side-shadow {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(0,0,0,0.18), transparent 12%, transparent 88%, rgba(0,0,0,0.16));
      pointer-events: none;
    }

    .mail-fab {
      position: absolute;
      top: 20px;
      right: 22px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: #ff4d3b;
      color: white;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(255, 77, 59, 0.35);
      z-index: 5;
      cursor: pointer;
    }

    .mail-fab svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: calc(100% - 34px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px 20px 0;
      text-align: center;
    }

    .crest {
      width: 42px;
      height: 52px;
      margin-top: 2px;
      margin-bottom: 6px;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
    }

    .title {
      font-family: "Oswald", sans-serif;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }

    .hero-art {
      position: relative;
      width: 640px;
      max-width: 92vw;
      height: 285px;
      margin-top: 18px;
      margin-bottom: 10px;
    }

    .cloud {
      position: absolute;
      bottom: 10px;
      background: #d9edf8;
      border-radius: 999px;
      box-shadow: inset 0 -3px 0 rgba(255,255,255,0.45);
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud.one {
      left: 90px;
      width: 150px;
      height: 34px;
    }

    .cloud.one::before {
      width: 44px;
      height: 44px;
      left: 15px;
      top: -16px;
    }

    .cloud.one::after {
      width: 54px;
      height: 54px;
      left: 58px;
      top: -24px;
    }

    .cloud.two {
      left: 228px;
      width: 205px;
      height: 42px;
    }

    .cloud.two::before {
      width: 56px;
      height: 56px;
      left: 18px;
      top: -22px;
    }

    .cloud.two::after {
      width: 70px;
      height: 70px;
      left: 84px;
      top: -30px;
    }

    .cloud.three {
      right: 62px;
      width: 172px;
      height: 34px;
    }

    .cloud.three::before {
      width: 46px;
      height: 46px;
      left: 18px;
      top: -18px;
    }

    .cloud.three::after {
      width: 58px;
      height: 58px;
      left: 70px;
      top: -24px;
    }

    .cloud.four {
      left: 272px;
      width: 112px;
      height: 28px;
      bottom: -6px;
    }

    .cloud.four::before {
      width: 34px;
      height: 34px;
      left: 14px;
      top: -12px;
    }

    .cloud.four::after {
      width: 40px;
      height: 40px;
      left: 42px;
      top: -16px;
    }

    .landmark {
      position: absolute;
      bottom: 34px;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.16));
    }

    .fountain {
      left: 90px;
      width: 108px;
      height: 148px;
    }

    .fountain .base {
      position: absolute;
      bottom: 0;
      left: 28px;
      width: 52px;
      height: 84px;
      background: #e0cfbe;
      border-radius: 14px 14px 8px 8px;
    }

    .fountain .top-bowl {
      position: absolute;
      top: 36px;
      left: 12px;
      width: 82px;
      height: 30px;
      background: #ead9ca;
      border-radius: 50%;
    }

    .fountain .lid {
      position: absolute;
      top: 0;
      left: 28px;
      width: 52px;
      height: 30px;
      background: #e8d6c5;
      border-radius: 50%;
    }

    .fountain .neck {
      position: absolute;
      top: 20px;
      left: 47px;
      width: 14px;
      height: 28px;
      background: #cfbea8;
      border-radius: 8px;
    }

    .green-house {
      left: 180px;
      width: 170px;
      height: 168px;
    }

    .green-house .back {
      position: absolute;
      left: 8px;
      bottom: 0;
      width: 124px;
      height: 124px;
      background: #395f95;
      clip-path: polygon(0 100%, 0 44%, 26% 0, 100% 0, 100% 100%);
    }

    .green-house .front {
      position: absolute;
      left: 52px;
      bottom: 0;
      width: 104px;
      height: 112px;
      background: #1e7d45;
      clip-path: polygon(0 100%, 0 18%, 12% 0, 100% 0, 100% 100%);
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .green-house .door {
      position: absolute;
      left: 92px;
      bottom: 0;
      width: 24px;
      height: 54px;
      background: #d6b84f;
      border-radius: 6px 6px 0 0;
    }

    .green-house .windows {
      position: absolute;
      left: 72px;
      bottom: 52px;
      width: 64px;
      height: 34px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .green-house .windows span {
      background: #7ed6ff;
      border-radius: 4px;
    }

    .tower {
      left: 316px;
      width: 58px;
      height: 190px;
    }

    .tower .body {
      position: absolute;
      bottom: 0;
      left: 18px;
      width: 22px;
      height: 150px;
      background: #587342;
      border-radius: 12px 12px 4px 4px;
    }

    .tower .segments {
      position: absolute;
      left: 15px;
      bottom: 10px;
      display: grid;
      gap: 8px;
      width: 28px;
    }

    .tower .segments span {
      height: 10px;
      background: #31422c;
      border-radius: 999px;
    }

    .tower .top {
      position: absolute;
      top: 4px;
      left: 10px;
      width: 38px;
      height: 44px;
      background: #6a844d;
      clip-path: polygon(50% 0%, 78% 20%, 100% 100%, 0 100%, 22% 20%);
    }

    .ferris-area {
      left: 380px;
      width: 176px;
      height: 160px;
    }

    .ferris-area .base {
      position: absolute;
      left: 36px;
      bottom: 0;
      width: 108px;
      height: 32px;
      background: #ab4f3a;
      border-radius: 6px 6px 0 0;
    }

    .ferris-area .wheel {
      position: absolute;
      left: 30px;
      top: 4px;
      width: 116px;
      height: 116px;
      border: 8px solid #9ad0eb;
      border-radius: 50%;
      background: radial-gradient(circle at center, #ffe9a9 0, #fff3cc 18%, transparent 20%);
    }

    .ferris-area .wheel::before,
    .ferris-area .wheel::after {
      content: "";
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      background: #9ad0eb;
    }

    .ferris-area .wheel::before {
      width: 4px;
      height: 100%;
    }

    .ferris-area .wheel::after {
      width: 100%;
      height: 4px;
    }

    .ferris-area .legs {
      position: absolute;
      left: 64px;
      bottom: 20px;
      width: 52px;
      height: 70px;
    }

    .ferris-area .legs::before,
    .ferris-area .legs::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 5px;
      height: 70px;
      background: #8db7d0;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .ferris-area .legs::before {
      left: 6px;
      transform: rotate(18deg);
    }

    .ferris-area .legs::after {
      right: 6px;
      transform: rotate(-18deg);
    }

    .pagoda {
      right: 74px;
      width: 118px;
      height: 150px;
    }

    .pagoda .roof1,
    .pagoda .roof2,
    .pagoda .roof3 {
      position: absolute;
      left: 10px;
      right: 10px;
      margin: auto;
      background: #c43f39;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .pagoda .roof1 {
      bottom: 90px;
      width: 96px;
      height: 38px;
    }

    .pagoda .roof2 {
      bottom: 58px;
      width: 80px;
      height: 30px;
    }

    .pagoda .roof3 {
      bottom: 30px;
      width: 62px;
      height: 24px;
    }

    .pagoda .body {
      position: absolute;
      left: 18px;
      bottom: 0;
      width: 82px;
      height: 92px;
      background: #7c211d;
      border-radius: 6px 6px 0 0;
    }

    .pagoda .body::before {
      content: "";
      position: absolute;
      inset: 16px 16px 0;
      border-top: 3px solid #f0bf65;
      border-left: 3px solid #f0bf65;
      border-right: 3px solid #f0bf65;
      border-radius: 4px 4px 0 0;
    }

    .church {
      right: 10px;
      width: 80px;
      height: 162px;
    }

    .church .spire {
      position: absolute;
      right: 20px;
      top: 4px;
      width: 28px;
      height: 112px;
      background: #d5c7af;
      clip-path: polygon(50% 0, 100% 28%, 76% 100%, 24% 100%, 0 28%);
    }

    .church .cross {
      position: absolute;
      right: 31px;
      top: -10px;
      width: 4px;
      height: 20px;
      background: #dfd0b6;
    }

    .church .cross::after {
      content: "";
      position: absolute;
      left: -6px;
      top: 5px;
      width: 16px;
      height: 4px;
      background: #dfd0b6;
    }

    .church .body {
      position: absolute;
      right: 10px;
      bottom: 0;
      width: 56px;
      height: 72px;
      background: #2a2b30;
      clip-path: polygon(50% 0, 100% 20%, 100% 100%, 0 100%, 0 20%);
      border-radius: 3px 3px 0 0;
    }

    .church .windows {
      position: absolute;
      right: 20px;
      bottom: 18px;
      display: grid;
      gap: 8px;
    }

    .church .windows span {
      width: 10px;
      height: 14px;
      background: #e8ddc6;
      border-radius: 999px 999px 3px 3px;
    }

    .search-wrap {
      width: 470px;
      max-width: 86vw;
      margin-top: 8px;
    }

    .search-box {
      width: 100%;
      height: 46px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      padding: 0 18px;
      box-shadow: 0 12px 22px rgba(0,0,0,0.12);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      color: #666;
      font-family: inherit;
    }

    .search-box button {
      border: none;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #666;
      padding: 0;
    }

    .search-box svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .shortcut-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
      width: 610px;
      max-width: 92vw;
      justify-items: center;
    }

    .shortcut {
      width: 98px;
      height: 74px;
      border: none;
      color: #0f1113;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      transition: transform 0.15s ease;
    }

    .shortcut:hover {
      transform: translateY(-2px);
    }

    .shortcut svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .shortcut .label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0,0,0,0.72);
      display: none;
    }

    .r1c1 { background: #34d17f; border-radius: 18px 0 0 0; }
    .r1c2 { background: #84deea; }
    .r1c3 { background: #74aeea; }
    .r1c4 { background: #a69af8; }
    .r1c5 { background: #6f65e9; }
    .r1c6 { background: #e3312d; border-radius: 0 18px 0 0; }

    .r2c1 { background: #ec3432; border-radius: 0 0 0 18px; }
    .r2c2 { background: #6f67f0; }
    .r2c3 { background: #b8b5ff; }
    .r2c4 { background: #76ace4; }
    .r2c5 { background: #83dfe7; }
    .r2c6 { background: #0ec2a9; border-radius: 0 0 18px 0; }

    .city-pill {
      margin-top: 28px;
      min-width: 164px;
      height: 34px;
      padding: 0 22px;
      border-radius: 999px;
      background: #6fb85f;
      border: none;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 10px 18px rgba(76, 135, 71, 0.24);
      cursor: pointer;
    }

    .city-pill svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34px;
      background: rgba(0,0,0,0.94);
      color: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      z-index: 4;
      letter-spacing: 0.1px;
    }

    @media (max-width: 900px) {
      .page {
        min-height: 100vh;
      }

      .title {
        font-size: 18px;
      }

      .hero-art {
        transform: scale(0.88);
        transform-origin: top center;
        margin-top: 4px;
        margin-bottom: -8px;
      }

      .shortcut-grid {
        width: 520px;
      }

      .shortcut {
        width: 84px;
        height: 68px;
      }
    }

    @media (max-width: 680px) {
      html,
      body {
        overflow: auto;
      }

      .page {
        min-height: 920px;
        height: auto;
        padding-bottom: 40px;
      }

      .content {
        height: auto;
      }

      .hero-art {
        width: 460px;
        height: 240px;
        transform: scale(0.9);
        margin-top: -6px;
        margin-bottom: -12px;
      }

      .shortcut-grid {
        grid-template-columns: repeat(3, 1fr);
        width: 300px;
        gap: 8px;
      }

      .shortcut {
        width: 94px;
        height: 72px;
        border-radius: 16px !important;
      }

      .footer {
        position: relative;
        margin-top: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="side-shadow"></div>

    <button class="mail-fab" aria-label="Mail">
      <svg viewBox="0 0 24 24">
        <path d="M20 4H4a2 2 0 0 0-2 2v.4l10 6.25L22 6.4V6a2 2 0 0 0-2-2Zm2 4.75-9.47 5.92a1 1 0 0 1-1.06 0L2 8.75V18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8.75Z"/>
      </svg>
    </button>

    <div class="content">
      <svg class="crest" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 2 57 10v28c0 17-10.5 29-25 38C17.5 67 7 55 7 38V10L32 2Z" fill="#0d7b3c"/>
        <path d="M32 8 51 14v22c0 13.8-8.2 23.4-19 31.1C21.2 59.4 13 49.8 13 36V14L32 8Z" fill="#1aa050"/>
        <path d="M18 27h28v12H18z" fill="#0e4b9b"/>
        <path d="M21 31h22" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="32" cy="23" r="5" fill="#ffcf4a"/>
        <path d="M17 44c5 4 11 6 15 6s10-2 15-6" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M11 10h42" stroke="#ffcf4a" stroke-width="3" stroke-linecap="round"/>
      </svg>

      <h1 class="title">PEMERINTAH KOTA SINGKAWANG</h1>

      <div class="hero-art">
        <div class="landmark fountain">
          <div class="lid"></div>
          <div class="neck"></div>
          <div class="top-bowl"></div>
          <div class="base"></div>
        </div>

        <div class="landmark green-house">
          <div class="back"></div>
          <div class="front"></div>
          <div class="windows">
            <span></span><span></span><span></span>
          </div>
          <div class="door"></div>
        </div>

        <div class="landmark tower">
          <div class="top"></div>
          <div class="body"></div>
          <div class="segments">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="landmark ferris-area">
          <div class="wheel"></div>
          <div class="legs"></div>
          <div class="base"></div>
        </div>

        <div class="landmark pagoda">
          <div class="roof1"></div>
          <div class="roof2"></div>
          <div class="roof3"></div>
          <div class="body"></div>
        </div>

        <div class="landmark church">
          <div class="cross"></div>
          <div class="spire"></div>
          <div class="body"></div>
          <div class="windows">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="cloud one"></div>
        <div class="cloud two"></div>
        <div class="cloud three"></div>
        <div class="cloud four"></div>
      </div>

      <div class="search-wrap">
        <div class="search-box">
          <input
            type="text"
            placeholder="Cari Informasi Seputar Singkawang di Sini"
          />
          <button aria-label="Search">
            <svg viewBox="0 0 24 24">
              <path d="M10.5 3a7.5 7.5 0 1 1 0 15 7.5 7.5 0 0 1 0-15Zm0 2a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Zm10.2 14.8-3.44-3.44-1.41 1.41 3.44 3.44a1 1 0 0 0 1.41-1.41Z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="shortcut-grid">
        <button class="shortcut r1c1" title="Pemerintahan">
          <svg viewBox="0 0 24 24">
            <path d="M3 20h18v2H3v-2Zm2-3h2v2H5v-2Zm4 0h2v2H9v-2Zm4 0h2v2h-2v-2Zm4 0h2v2h-2v-2ZM12 2l9 4v2H3V6l9-4Zm-7 7h14v7H5V9Z"/>
          </svg>
        </button>
        <button class="shortcut r1c2" title="Monitoring">
          <svg viewBox="0 0 24 24">
            <path d="M12 5c5.5 0 10 7 10 7s-4.5 7-10 7S2 12 2 12s4.5-7 10-7Zm0 3.2A3.8 3.8 0 1 0 12 16a3.8 3.8 0 0 0 0-7.8Z"/>
          </svg>
        </button>
        <button class="shortcut r1c3" title="Media">
          <svg viewBox="0 0 24 24">
            <path d="M12 8.5A3.5 3.5 0 1 1 12 15.5 3.5 3.5 0 0 1 12 8.5Zm8-1.5h-2.1l-1.2-2H7.3l-1.2 2H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
          </svg>
        </button>
        <button class="shortcut r1c4" title="Layanan">
          <svg viewBox="0 0 24 24">
            <path d="M10 18a8 8 0 1 1 4 0v2h2a2 2 0 0 1 0 4H8a2 2 0 1 1 0-4h2v-2Zm2-14a6 6 0 0 0-3.6 10.8l.6.45V18h6v-2.75l.6-.45A6 6 0 0 0 12 4Z"/>
          </svg>
        </button>
        <button class="shortcut r1c5" title="Data">
          <svg viewBox="0 0 24 24">
            <path d="M12 2c4.97 0 9 1.34 9 3s-4.03 3-9 3-9-1.34-9-3 4.03-3 9-3Zm-9 6v4c0 1.66 4.03 3 9 3s9-1.34 9-3V8c-2.02 1.56-5.9 2-9 2s-6.98-.44-9-2Zm0 8v4c0 1.66 4.03 3 9 3s9-1.34 9-3v-4c-2.02 1.56-5.9 2-9 2s-6.98-.44-9-2Z"/>
          </svg>
        </button>
